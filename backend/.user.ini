; InfinityFree free-tier optimizations
; These settings are advisory — InfinityFree may override some of them.
;
; Place this file in your document root (htdocs/ or public_html/).

; ── PHP limits ─────────────────────────────────────────────────────
max_execution_time = 15
memory_limit = 128M
post_max_size = 8M
upload_max_filesize = 4M

; ── Error handling (production) ────────────────────────────────────
display_errors = Off
display_startup_errors = Off
log_errors = On

; ── Sessions ───────────────────────────────────────────────────────
; InfinityFree defaults: ~24 min, shared save path. Keep defaults.
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

; ── Extensions ─────────────────────────────────────────────────────
; InfinityFree has most standard extensions. APCu is NOT available.
; The Cache class detects this and falls back to file-based caching.
